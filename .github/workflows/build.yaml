name: Sync Node base image to GitHub Container Registry

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1" # Every Monday at 06:00 UTC

permissions:
  packages: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      packages: write
      id-token: write
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # Node 24 (Active LTS)
          - BASE_IMAGE: "node:24-bookworm-slim"
            TAG_VERSION: "24"
          - BASE_IMAGE: "node:24.15-bookworm-slim"
            TAG_VERSION: "24.15"
          - BASE_IMAGE: "node:24.14-bookworm-slim"
            TAG_VERSION: "24.14"
          - BASE_IMAGE: "node:24.13-bookworm-slim"
            TAG_VERSION: "24.13"
          # Node 22 (Maintenance LTS)
          - BASE_IMAGE: "node:22-bookworm-slim"
            TAG_VERSION: "22"
          - BASE_IMAGE: "node:22.22-bookworm-slim"
            TAG_VERSION: "22.22"
          - BASE_IMAGE: "node:22.14-bookworm-slim"
            TAG_VERSION: "22.14"

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to the Container registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          push: ${{ github.ref == 'refs/heads/main' || github.event_name == 'schedule' }}
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository_owner }}/node:${{ matrix.TAG_VERSION }}
          build-args: |
            BASE_IMAGE=${{ matrix.BASE_IMAGE }}
          cache-from: type=gha,scope=${{ matrix.TAG_VERSION }}
          cache-to: type=gha,mode=max,scope=${{ matrix.TAG_VERSION }}
