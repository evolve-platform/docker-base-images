name: Sync Node base image to GitHub Container Registry

on:
  workflow_dispatch:
  schedule:
    - cron: "* * * * 0" # Every monday

permissions:
  packages: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      packages: write
      id-token: write
      security-events: write
    strategy:
      matrix:
        include:
          - BASE_IMAGE: "node:24-bookworm-slim"
            TAG_VERSION: "24"
          - BASE_IMAGE: "node:24.14-bookworm-slim"
            TAG_VERSION: "24.14"
          - BASE_IMAGE: "node:24.13-bookworm-slim"
            TAG_VERSION: "24.13"
          - BASE_IMAGE: "node:24.11.1-bookworm-slim"
            TAG_VERSION: "24.11"
          - BASE_IMAGE: "node:24.8-bookworm-slim"
            TAG_VERSION: "24.8"
          - BASE_IMAGE: "node:24.4-bookworm-slim"
            TAG_VERSION: "24.4"
          - BASE_IMAGE: "node:24.1-bookworm-slim"
            TAG_VERSION: "24.1"
          - BASE_IMAGE: "node:24.0-bookworm-slim"
            TAG_VERSION: "24.0"
          - BASE_IMAGE: "node:22-bookworm-slim"
            TAG_VERSION: "22"
          - BASE_IMAGE: "node:22.22-bookworm-slim"
            TAG_VERSION: "22.22"
          - BASE_IMAGE: "node:22.14-bookworm-slim"
            TAG_VERSION: "22.14"
          - BASE_IMAGE: "node:22.13-bookworm-slim"
            TAG_VERSION: "22.13"
          - BASE_IMAGE: "node:22.12-bookworm-slim"
            TAG_VERSION: "22.12"
          - BASE_IMAGE: "node:20.20-bookworm-slim"
            TAG_VERSION: "20.20"
          - BASE_IMAGE: "node:20.18-bookworm-slim"
            TAG_VERSION: "20.18"
          - BASE_IMAGE: "node:20.12-bookworm-slim"
            TAG_VERSION: "20.12"

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to the Container registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          push: ${{ github.ref == 'refs/heads/main' || github.event_name == 'schedule' }}
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository_owner }}/node:${{ matrix.TAG_VERSION }}
          build-args: |
            BASE_IMAGE=${{ matrix.BASE_IMAGE }}
          cache-from: type=gha,scope=${{ matrix.TAG_VERSION }}
          cache-to: type=gha,mode=max,scope=${{ matrix.TAG_VERSION }}
